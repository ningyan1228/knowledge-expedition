<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2E5B4F" />
    <meta name="description" content="把零散知识，走成一张自己的地图。" />
    <link rel="canonical" href="https://expedition.101921.xyz/" />
    <meta property="og:url" content="https://expedition.101921.xyz/" />
    <title>知识远征</title>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const route = params.get("__route");
        const query = params.get("__query");
        if (route) {
          window.history.replaceState(null, "", route + (query ? `?${query}` : "") + window.location.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
